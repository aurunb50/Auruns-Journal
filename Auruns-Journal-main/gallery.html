  <header class="site-header" id="siteHeader">
    <div class="container">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">aurun<span class="accent">.</span>dev</a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Toggle navigation">menu</button>

          <li><a href="index.html">Home</a></li>

  <main>
    <section class="gallery-hero">
      <div class="container">
        <h1>Gallery</h1>
        <p>Photos from internships, projects, and college life.</p>
      </div>
    </section>

    <div class="container">

      <!-- Narmco Internship -->
      <div class="gallery-group" id="narmco-section">
        <h2>Narmco System Admin Internship</h2>
        <div class="gallery-grid">
          <div class="gallery-item">
            <img src="images/gallery/narmco.jpg" alt="First day at Narmco" loading="lazy" width="800" height="600">
            <span class="image-caption">First Day</span>
          </div>
          <div class="gallery-item">
            <img src="images/gallery/narmco1.jpg" alt="Narmco Internship" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/Narmco2.jpg" alt="Narmco Internship" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/Narmco3.jpg" alt="Narmco Internship" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/narmco4.jpg" alt="Last day at Narmco" loading="lazy" width="800" height="600">
            <span class="image-caption">Last Day</span>
          </div>
          <div class="gallery-item">
            <video controls preload="none" loading="lazy">
              <source src="images/gallery/narmco.mp4" type="video/mp4">
            </video>
          </div>
          <div class="gallery-item">
            <video controls preload="none" loading="lazy">
              <source src="images/gallery/narmco2.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>

      <!-- Enactus -->
      <div class="gallery-group">
        <h2>Enactus — Endure & Sparkerz Projects</h2>
        <div class="gallery-grid">
          <div class="gallery-item">
            <img src="images/gallery/Enactus.jpg" alt="Enactus Project" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus.png" alt="Enactus Project" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/Sparkerz.jpg" alt="Sparkerz Project" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/Sparkerz1.jpg" alt="Sparkerz Project" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus2.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus3.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus4.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus6.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus7.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus9.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus10.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus11.jpg" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/enactus11.png" alt="Enactus" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <video controls preload="none" loading="lazy">
              <source src="images/gallery/enactus.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>

      <!-- College -->
      <div class="gallery-group">
        <h2>College Life</h2>
        <div class="gallery-grid">
          <div class="gallery-item">
            <img src="images/gallery/College.jpg" alt="College" loading="lazy" width="800" height="600">
          </div>
          <div class="gallery-item">
            <img src="images/gallery/college1.jpg" alt="College" loading="lazy" width="800" height="600">
          </div>
        </div>
      </div>

    </div>

    <!-- Lightbox -->
    <div id="imageLightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-content" id="lightboxImg" alt="Enlarged photo">
    </div>
